name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        include:
          - arch: aarch64_cortex-a53
            branch: openwrt-24.10
          - arch: x86_64
            branch: openwrt-24.10

    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize SDK
        working-directory: /builder
        run: |
          HOME=/builder ./setup.sh || true
          test -f Makefile

      - name: Add custom feed and build
        working-directory: /builder
        run: |
          # Register the package directory as a feed
          echo "src-link whu_auth ${{ github.workspace }}/luci-app-whu-auth" >> feeds.conf
          cat feeds.conf

          # Update only our feed
          ./scripts/feeds update whu_auth
          ./scripts/feeds install -a -p whu_auth

          # Verify the package is found
          echo "---"
          ./scripts/feeds list | grep whu-auth || echo "WARNING: package not found in feeds"

          # Configure
          echo "CONFIG_PACKAGE_luci-app-whu-auth=m" > .config
          make defconfig

          # Build
          make package/luci-app-whu-auth/compile V=s

      - name: Collect and upload
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-${{ matrix.arch }}
          path: /builder/bin/**/luci-app-whu-auth*.ipk
          if-no-files-found: warn
          retention-days: 30
