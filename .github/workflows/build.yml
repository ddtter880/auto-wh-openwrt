name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        include:
          - arch: aarch64_cortex-a53
            branch: openwrt-24.10
          - arch: x86_64
            branch: openwrt-24.10

    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize SDK
        working-directory: /builder
        run: |
          HOME=/builder ./setup.sh || true
          test -f Makefile

      - name: Copy package and build
        working-directory: /builder
        run: |
          # Copy package directly into SDK's package directory
          cp -r ${{ github.workspace }}/luci-app-whu-auth package/luci-app-whu-auth

          # Verify
          ls package/luci-app-whu-auth/Makefile

          # Update feeds (standard feeds, not custom)
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Configure
          echo "CONFIG_PACKAGE_luci-app-whu-auth=m" > .config
          make defconfig

          # Check if package is in config
          grep whu .config || echo "WARNING: package not in .config"

          # Build
          make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        working-directory: /builder
        run: |
          find bin/ -name "luci-app-whu-auth*.ipk" -ls
          mkdir -p /tmp/output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} /tmp/output/ \;
          ls -la /tmp/output/

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-${{ matrix.arch }}
          path: /tmp/output/*.ipk
          if-no-files-found: warn
          retention-days: 30
