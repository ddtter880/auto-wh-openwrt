name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        include:
          - arch: aarch64_cortex-a53
            branch: openwrt-24.10
          - arch: x86_64
            branch: openwrt-24.10

    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize SDK
        working-directory: /builder
        run: |
          HOME=/builder ./setup.sh || true
          test -f Makefile

      - name: Copy package and build
        working-directory: /builder
        run: |
          # Find where the checkout actually is inside the container
          CHECKOUT_DIR=$(pwd -P)/../.. 
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Runner workspace: /__w"
          
          # The checkout lands at /__w/<repo>/<repo> in container
          # But we're running in /builder, so find the checkout
          ls /__w/ 2>/dev/null || true
          ls /__w/auto-wh-openwrt/ 2>/dev/null || true
          ls /__w/auto-wh-openwrt/auto-wh-openwrt/ 2>/dev/null || true
          
          # Try the standard container workspace path
          REPO_DIR=""
          if [ -d "/__w/auto-wh-openwrt/auto-wh-openwrt/luci-app-whu-auth" ]; then
            REPO_DIR="/__w/auto-wh-openwrt/auto-wh-openwrt"
          elif [ -d "$GITHUB_WORKSPACE/luci-app-whu-auth" ]; then
            REPO_DIR="$GITHUB_WORKSPACE"
          else
            # Find it
            REPO_DIR=$(find / -maxdepth 5 -name "luci-app-whu-auth" -type d 2>/dev/null | head -1 | sed 's|/luci-app-whu-auth||')
          fi
          
          echo "Found repo at: $REPO_DIR"
          ls "$REPO_DIR/luci-app-whu-auth/Makefile"
          
          # Copy package into SDK
          cp -r "$REPO_DIR/luci-app-whu-auth" package/luci-app-whu-auth
          ls package/luci-app-whu-auth/Makefile

          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Configure
          echo "CONFIG_PACKAGE_luci-app-whu-auth=m" > .config
          make defconfig
          grep whu .config || echo "WARNING: package not in .config"

          # Build
          make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        working-directory: /builder
        run: |
          find bin/ -name "luci-app-whu-auth*.ipk" -ls
          mkdir -p /tmp/output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} /tmp/output/ \;
          ls -la /tmp/output/

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-${{ matrix.arch }}
          path: /tmp/output/*.ipk
          if-no-files-found: warn
          retention-days: 30
