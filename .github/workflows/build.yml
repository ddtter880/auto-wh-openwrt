name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: openwrt/sdk:x86-64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SDK
        run: |
          [ ! -d ./scripts ] && ./setup.sh

      - name: Update feeds
        run: |
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a

      - name: Copy package source
        run: |
          mkdir -p package/luci-app-whu-auth
          cp -r luci-app-whu-auth/* package/luci-app-whu-auth/

      - name: Configure build
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_PACKAGE_luci-app-whu-auth=y
          EOF
          make defconfig

      - name: Build ipk
        run: |
          make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} output/ \; || true
          ls -la output/ || echo "No ipk found"

      - name: Upload ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-ipk
          path: output/*.ipk
          retention-days: 30
