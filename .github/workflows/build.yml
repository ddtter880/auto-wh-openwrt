name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm:
    name: Build ipk (ARM Cortex-A53 / IPQ6000)
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:aarch64_cortex-a53
      options: --user root
    defaults:
      run:
        working-directory: /builder

    steps:
      - name: Fix permissions
        run: chmod -R 777 /__w || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: /builder/repo

      - name: Setup SDK
        run: |
          ./setup.sh || true
          ls Makefile
          head -5 Makefile

      - name: Update feeds
        run: |
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a

      - name: Copy package source
        run: |
          mkdir -p package/luci-app-whu-auth
          cp -r repo/luci-app-whu-auth/* package/luci-app-whu-auth/

      - name: Configure build
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_PACKAGE_luci-app-whu-auth=m
          EOF
          make defconfig

      - name: Build ipk
        run: make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p /tmp/output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} /tmp/output/ \; || true
          ls -la /tmp/output/ || echo "No ipk found"

      - name: Upload ARM ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-arm-aarch64
          path: /tmp/output/*.ipk
          if-no-files-found: warn
          retention-days: 30

  build-x86:
    name: Build ipk (x86_64)
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:x86-64
      options: --user root
    defaults:
      run:
        working-directory: /builder

    steps:
      - name: Fix permissions
        run: chmod -R 777 /__w || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: /builder/repo

      - name: Setup SDK
        run: |
          ./setup.sh || true
          ls Makefile
          head -5 Makefile

      - name: Update feeds
        run: |
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a

      - name: Copy package source
        run: |
          mkdir -p package/luci-app-whu-auth
          cp -r repo/luci-app-whu-auth/* package/luci-app-whu-auth/

      - name: Configure build
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_PACKAGE_luci-app-whu-auth=m
          EOF
          make defconfig

      - name: Build ipk
        run: make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p /tmp/output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} /tmp/output/ \; || true
          ls -la /tmp/output/ || echo "No ipk found"

      - name: Upload x86 ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-x86-64
          path: /tmp/output/*.ipk
          if-no-files-found: warn
          retention-days: 30
