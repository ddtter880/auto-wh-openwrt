name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.arch }} / ${{ matrix.branch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        branch:
          - openwrt-24.10
        include:
          - arch: aarch64_cortex-a53
            branch: openwrt-24.10
            package_extension: ipk
          - arch: x86_64
            branch: openwrt-24.10
            package_extension: ipk

    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize SDK
        working-directory: /builder
        run: |
          HOME=/builder ./setup.sh || true
          ls Makefile

      - name: Add custom feed
        working-directory: /builder
        run: |
          echo "src-link whu_auth ${{ github.workspace }}" >> feeds.conf
          cat feeds.conf

      - name: Update and install feeds
        working-directory: /builder
        run: |
          ./scripts/feeds update whu_auth
          ./scripts/feeds install -a -p whu_auth

      - name: Configure build
        working-directory: /builder
        run: |
          echo "CONFIG_PACKAGE_luci-app-whu-auth=m" > .config
          make defconfig

      - name: Build ipk
        working-directory: /builder
        run: |
          make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        working-directory: /builder
        run: |
          echo "=== Looking for ipk files ==="
          find ./bin -type f -name "luci-app-whu-auth*.ipk" -ls
          find ./bin -type f -name "luci-app-whu-auth*.ipk" -exec cp {} /builder/ \;
          ls -la /builder/luci-app-whu-auth*.ipk || echo "No ipk found"

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-${{ matrix.arch }}-${{ matrix.branch }}
          path: /builder/luci-app-whu-auth*.ipk
          if-no-files-found: warn
          retention-days: 30
