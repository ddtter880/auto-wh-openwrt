name: Build OpenWrt ipk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: "${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - x86_64
        include:
          - arch: aarch64_cortex-a53
            branch: openwrt-24.10
          - arch: x86_64
            branch: openwrt-24.10

    container:
      image: openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize SDK
        working-directory: /builder
        run: |
          HOME=/builder ./setup.sh || true
          test -f Makefile

      - name: Register and build package
        working-directory: /builder
        run: |
          # src-link expects a directory with package subdirectories
          # Each subdir must have a Makefile
          # Our repo structure: $GITHUB_WORKSPACE/luci-app-whu-auth/Makefile
          echo "src-link custom_packages ${{ github.workspace }}" >> feeds.conf
          cat feeds.conf

          # Update our custom feed
          ./scripts/feeds update custom_packages
          ./scripts/feeds install -a -p custom_packages

          # Check if package was found
          echo "=== Feeds list ==="
          ./scripts/feeds list | grep -i whu || echo "Package NOT found in feeds"

          # Check package directory
          echo "=== Package dir ==="
          ls -la package/custom_packages/ 2>/dev/null || ls -la package/feeds/custom_packages/ 2>/dev/null || echo "No package dir"

          # Configure with the package
          echo "CONFIG_PACKAGE_luci-app-whu-auth=m" > .config
          make defconfig
          grep -i whu .config || echo "Package NOT in .config"

          # Build
          make package/luci-app-whu-auth/compile V=s

      - name: Collect artifacts
        working-directory: /builder
        run: |
          find bin/ -name "luci-app-whu-auth*.ipk" -ls
          mkdir -p /tmp/output
          find bin/ -name "luci-app-whu-auth*.ipk" -exec cp {} /tmp/output/ \;
          ls -la /tmp/output/

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-whu-auth-${{ matrix.arch }}
          path: /tmp/output/*.ipk
          if-no-files-found: warn
          retention-days: 30
